name: Security PR Gates

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-and-security:
    name: Quality and local security checks
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://ci.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_anon_key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Environment security check
        run: npm run security:env

      - name: Static security review
        run: npm run security:static
        env:
          SECURITY_STATIC_REPORT: security-static-review.md

      - name: Dependency audit (advisory)
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Upload static security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-static-review
          path: security-static-review.md
          if-no-files-found: ignore

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: high

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/default
