name: Scheduled Security Review

on:
  schedule:
    - cron: "17 13 * * *"
  workflow_dispatch:
    inputs:
      cadence:
        description: Review cadence to run
        required: false
        default: daily
        type: choice
        options:
          - daily
          - weekly
          - monthly
          - quarterly

permissions:
  contents: read
  issues: write

jobs:
  scheduled-security:
    name: Scheduled security status
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Determine cadence
        id: cadence
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "cadence=${{ inputs.cadence }}" >> "$GITHUB_OUTPUT"
          else
            node -e "const d=new Date(); const c=['daily']; if(d.getUTCDay()===1)c.push('weekly'); if(d.getUTCDate()===1)c.push('monthly'); if(d.getUTCDate()===1 && [0,3,6,9].includes(d.getUTCMonth()))c.push('quarterly'); console.log('cadence='+c.join(','));" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run scheduled security checks
        id: checks
        shell: bash
        run: |
          set +e
          mkdir -p security-reports
          {
            echo "# Security Scheduled Status"
            echo
            echo "Cadence: ${{ steps.cadence.outputs.cadence }}"
            echo "UTC run: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo
            echo "## Environment hygiene"
            npm run security:env
            ENV_STATUS=$?
            echo
            echo "## Static security review"
            SECURITY_STATIC_REPORT=security-reports/static-review.md npm run security:static
            STATIC_STATUS=$?
            echo
            echo "## Dependency audit"
            npm audit --audit-level=high
            AUDIT_STATUS=$?
            echo
            echo "## Cadence instructions"
            cat docs/security/scheduled-security-workflow.md
            echo
            echo "## Exit codes"
            echo "- env: $ENV_STATUS"
            echo "- static: $STATIC_STATUS"
            echo "- audit: $AUDIT_STATUS"
          } > security-reports/status.md 2>&1

          cat security-reports/status.md >> "$GITHUB_STEP_SUMMARY"
          if grep -q "\[CRITICAL\]" security-reports/status.md; then
            echo "critical=true" >> "$GITHUB_OUTPUT"
          else
            echo "critical=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload scheduled security report
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-security-report
          path: security-reports

      - name: Create issue for critical scheduled finding
        if: steps.checks.outputs.critical == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Critical scheduled security finding - ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              'The scheduled security workflow detected at least one Critical finding.',
              '',
              'Review the workflow summary and `scheduled-security-report` artifact for details.',
              '',
              'Use `docs/security/triage.md` for response expectations.'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security']
            });
